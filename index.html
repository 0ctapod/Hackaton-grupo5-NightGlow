<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NightGlow</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <nav>navbar</nav>


    <main>
        <section id="seccionCatalogo">Catalogo</section>
        <section id="seccionCarrito" class="container-fluid py-5">
            <div class="container-lg">
                <div class="row">

                    <div class="col-12">
                        <div class="header-description my-4">
                            <h2 class="title-header fw-bold display-4">
                                SUS <br><span class="resalto">RESERVAS</span>
                            </h2>
                            <p class="description-header mb-0">
                                Tu selección se guarda localmente para esta sesión. Revisa tus artículos antes de ir a
                                la caja.
                            </p>
                        </div>
                    </div>

                    <div class="container-list col-12 col-lg-8 my-4">
                        <div class="d-flex align-items-center mb-3">
                            <span class="text-warning small fw-bold text-uppercase" style="letter-spacing: 2px;">Lista</span>
                            <div class="flex-grow-1 ms-3 border-bottom border-secondary opacity-25"></div>
                        </div>

                        <div id="listCarrito" class="list-carrito">
                            listaCarrito
                        </div>
                    </div>

                    <aside id="resumenCarrito" class="resumen-carrito col-12 col-lg-4 my-4">
                        resumen_carrito
                    </aside>

                </div>
            </div>
        </section>
    </main>



    <footer>Footer</footer>

    <script src="./js/app.js"></script>
</body>

</html>
