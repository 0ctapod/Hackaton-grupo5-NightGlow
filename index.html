<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NightGlow</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg barra-navegacion sticky-top">
            <div class="container">
                <a class="navbar-brand logo-principal" href="#">
                    <img
                        src="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&w=200&q=80"
                        alt="Logo de NightGlow"
                        class="imagen-logo">
                    <span class="texto-logo">NightGlow</span>
                </a>

                <button
                    class="navbar-toggler boton-menu"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menuPrincipal"
                    aria-controls="menuPrincipal"
                    aria-expanded="false"
                    aria-label="Abrir menú de navegación">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="menuPrincipal">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link enlace-navegacion" href="#seccionCatalogo">Catálogo</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link enlace-navegacion" href="#seccionCarrito">Carrito</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section id="seccionCatalogo">Catalogo</section>
        <section id="seccionCarrito">Carrito</section>
    </main>

    <footer class="pie-pagina">
        <div class="container contenido-pie">
            <div class="info-pie">
                <h3 class="titulo-pie">NightGlow</h3>
                <p class="texto-pie mb-0">
                    Cócteles, mocktails y snacks.
                </p>
            </div>

            <div class="links-pie">
                <a href="#seccionCatalogo" class="enlace-pie">Catálogo</a>
                <a href="#seccionCarrito" class="enlace-pie">Carrito</a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/app.js"></script>
</body>

</html>
