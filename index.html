<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NightGlow</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark">
    <!-- ============================
         BARRA DE NAVEGACION
         ============================ -->

    <nav class="navbar navbar-expand-lg barra-navegacion sticky-top">
        <div class="container">
            <a class="navbar-brand logo-principal" href="#inicio">
                <img src="img/NightGlow.png" alt="Logo de NightGlow" class="imagen-logo">
                <span class="texto-logo">NightGlow</span>
            </a>

            <button class="navbar-toggler boton-menu" type="button" data-bs-toggle="collapse"
                data-bs-target="#menuPrincipal" aria-controls="menuPrincipal" aria-expanded="false"
                aria-label="Abrir menú de navegación">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menuPrincipal">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link enlace-navegacion" href="#seccionCatalogo">Catálogo</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link enlace-navegacion" href="#seccionCarrito">Carrito</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


    <main id="inicio">

        <!-- ============================
             CATALOGO
             El contenedor queda vacio porque JS va a renderizar
             las tarjetas dinamicamente desde un array de objetos.
             ============================ -->
        <section id="seccionCatalogo" class="container py-5">
            <h2 id="titulo-menu" class="text-center mb-4">Menú NightGlow</h2>

            <div id="botones-filtro" aria-label="Filtros de categoría">
                <button class="btn-filtro activo" data-category="all">Todos</button>
                <button class="btn-filtro" data-category="cocktail">Cocktails</button>
                <button class="btn-filtro" data-category="mocktail">Mocktails</button>
                <button class="btn-filtro" data-category="snack">Snacks</button>
            </div>

            <div id="contenedor-productos" class="mt-4">
                <!-- JS inserta aqui las tarjetas -->
            </div>
        </section>

        <!-- ============================
             CARRITO
             listCarrito = items del carrito
             resumenCarrito = total, cantidad y acciones
             ============================ -->
        <section id="seccionCarrito" class="container-fluid py-5">
            <div class="container-lg">
                <div class="row">
                    <div class="col-12">
                        <div class="header-description my-4">
                            <h2 class="title-header fw-bold display-4">
                                Tu <span class="resalto">carrito</span>
                            </h2>
                            <p class="description-header mb-0">
                                Tus productos se guardan en el navegador con localStorage, así que no se pierden al
                                recargar la página.
                            </p>
                        </div>
                    </div>

                    <div class="container-list col-12 col-lg-8 my-4">
                        <div class="d-flex align-items-center mb-3">
                            <span class="text-warning small fw-bold text-uppercase"
                                style="letter-spacing: 2px;">Lista</span>
                            <div class="flex-grow-1 ms-3 border-bottom border-secondary opacity-25"></div>
                        </div>

                        <div id="listCarrito" class="list-carrito">
                            <!-- JS inserta aqui los items del carrito -->
                        </div>
                    </div>

                    <aside id="resumenCarrito" class="resumen-carrito col-12 col-lg-4 my-4">
                        <!-- JS inserta aqui el resumen del carrito -->
                    </aside>
                </div>
            </div>
        </section>

    </main>

    <footer class="pie-pagina">
        <div class="container contenido-pie">
            <div class="info-pie">
                <h3 class="titulo-pie">NightGlow</h3>
                <p class="texto-pie mb-0">Cócteles, mocktails y snacks con una vibra neón.</p>
            </div>

            <div class="links-pie">
                <a href="#seccionCatalogo" class="enlace-pie">Catálogo</a>
                <a href="#seccionCarrito" class="enlace-pie">Carrito</a>
            </div>
        </div>
    </footer>

    <script src="./js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
